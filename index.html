<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Tracker</title>
     <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class = "container">
          <h1>Internship Tracker </h1> 
          <div class="dashboard">

    <input 
    type="text" 
    id="searchInput" 
    placeholder="Search internship..."
    >


    <div class="counter">

        <p>Total: <span id="totalCount">0</span></p>

        <p>Applied: <span id="appliedCount">0</span></p>

        <p>Interview: <span id="interviewCount">0</span></p>

        <p>Offer: <span id="offerCount">0</span></p>

        <p>Selected: <span id="selectedCount">0</span></p>

        <p>Rejected: <span id="rejectedCount">0</span></p>


    </div>

</div> 
          <div class = "board">
            <div class = "column">
                <h3 class="applied">Applied</h3>
                <div class = "card">
                    
                    <h3>Google</h3>
                    <p>SWE Intern</p>
                    <small>Applied: 1 June</small>
                </div>
                
               <button class="add-btn">+ Add</button>
            </div>
            <div class="column">
                <h3 class="shortlisted">Shortlisted</h3>
                
                <div class ="card">
                    <h3>Razorpay</h3>
                    <p>Full Stack Intern</p>
                    <small>Applied : 28 May</small>
                </div>

                <button class="add-btn">+ Add</button>
            </div>

              
            <div class = "column">
                 <h3 class ="offer">Offer</h3>
                
               
                <div class = "card">
                    <h3>Zepto</h3>
                    <p>React Intern</p>
                    <small>Applied: 20 May</small>
                </div>

                <button class="add-btn">+ Add</button>
            </div>


                

                <div class ="column">
                    <h3 class=" selected">Selected</h3>

                   <button class="add-btn">+ Add</button>
                
                </div>


                <div class="column">
                    <h3 class = "rejected">Rejected</h3>
                 <button class="add-btn">+ Add</button>
                </div>



    
            </div>

    </div>
    <script src = "app.js"></script>
   
   
    
</body>
</html>
